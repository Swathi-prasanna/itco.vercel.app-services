<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home One</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <section class="hero-section">

    <div class="container">

      <div class="row align-items-center">

        <!-- LEFT CONTENT -->

        <div class="col-lg-6">

          <div class="hero-content">

            <span class="hero-subtitle">
              IT solutions for the new era
            </span>

            <h1>
              Beautiful IT services for your success
            </h1>

            <p>
              Leverage agile frameworks to provide a robust synopsis for high
              level overviews. Iterative approaches bring table survival
              strategies.
            </p>

            <div class="hero-buttons">

              <a href="#" class="theme-btn">
                Read More
              </a>

              <div class="video-btn-area">

                <a href="#" class="video-btn">
                  <i class="fas fa-play"></i>
                </a>

                <span>Play Intro</span>

              </div>

            </div>

            <!-- TEAM MEMBERS -->

            <div class="team-wrapper">

              <div class="team-images">

                <img src="./itco.vercel.app/image (2).png" alt="">

                <img src="./itco.vercel.app/image (3).png" alt="">

                <img src="./itco.vercel.app/image (4).png" alt="">

                <img src="./itco.vercel.app/image (3).png" alt="">

                <img src="./itco.vercel.app/image (6).png" alt="">

              </div>

              <div class="team-text">

                <h4>36k+</h4>

                <p>Team Members</p>

              </div>

            </div>

          </div>

        </div>

        <!-- RIGHT IMAGE -->

        <div class="col-lg-6">

          <div class="hero-image">

            <img
              src="./itco.vercel.app/image (7).png"
              class="main-image"
              alt="">

            <div class="small-image">

              <img
                src="./itco.vercel.app/image (8).png"
                alt="">

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
